<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>KahwaTech · الموبايل</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#3a6a48">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%233a6a48'/%3E%3Ctext x='50' y='72' font-family='system-ui,sans-serif' font-size='64' font-weight='900' fill='%23fff' text-anchor='middle'%3EK%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<script>window.__KAHWA_NO_THEME_WIDGET = true;</script>
<script src="theme-control.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%;
    font-family: "Tajawal", system-ui, sans-serif; background: #ecebe6;
    color: #1a1410; overscroll-behavior: none; }
  #root { width: 100%; height: 100%; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  /* Screen toggle pill — top-center so it clears the bottom cart bar. */
  .mob-switch { position: fixed; top: calc(env(safe-area-inset-top, 0px) + 10px);
    left: 50%; transform: translateX(-50%); z-index: 2147483645;
    display: flex; gap: 3px; padding: 3px; border-radius: 999px;
    background: rgba(255,255,255,.82); -webkit-backdrop-filter: blur(20px) saturate(160%);
    backdrop-filter: blur(20px) saturate(160%); border: 1px solid rgba(20,12,5,.10);
    box-shadow: 0 1px 0 rgba(255,255,255,.6) inset, 0 10px 30px -12px rgba(20,12,5,.35); }
  .mob-switch button { appearance: none; border: 0; cursor: pointer; padding: 7px 16px;
    border-radius: 999px; background: transparent; color: #4a4036;
    font-family: inherit; font-size: 13px; font-weight: 700; line-height: 1; transition: all .18s ease; }
  .mob-switch button[aria-pressed="true"] { background: #fff; color: #1a1410;
    box-shadow: 0 1px 2px rgba(20,12,5,.18); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="menu-data.js"></script>
<script type="text/babel" src="item-photo.jsx"></script>
<script type="text/babel" src="past-orders.jsx"></script>
<script type="text/babel" src="variation-fast-clean.jsx"></script>
<script type="text/babel" src="mobile-screens.jsx"></script>
<script type="text/babel" src="responsive-stage.jsx"></script>

<script type="text/babel" data-presets="react">
  function App() {
    const [screen, setScreen] = React.useState('waiter');
    const bg = window.themeBg();
    return (
      <>
        <window.PhoneStage bg={bg}>
          {screen === 'waiter' ? <window.KahwaWaiterMobile /> : <window.KahwaBoufiyaMobile />}
        </window.PhoneStage>
        <div className="mob-switch" role="group" aria-label="اختيار الشاشة">
          <button type="button" aria-pressed={screen === 'waiter'}
                  onClick={() => setScreen('waiter')}>الموظف</button>
          <button type="button" aria-pressed={screen === 'boufiya'}
                  onClick={() => setScreen('boufiya')}>البوفية</button>
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
