<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>KahwaTech · شاشات الموبايل (طولي)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: "Tajawal", system-ui, sans-serif;
    background: #ecebe6; color: #1a1410;
    overscroll-behavior: none;
  }
  #root { width: 100%; height: 100%; }
  /* Inner screen scrollbars hidden so the phone frame looks clean */
  .kahwa-phone-inner ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="menu-data.js"></script>
<script type="text/babel" src="item-photo.jsx"></script>
<script type="text/babel" src="past-orders.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="mobile-screens.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel" data-presets="react">
  // Phone frame wrapper — IOSDevice gives us the bezel + status bar + home indicator.
  // We override its inner container to fill 100% height with our app, and disable
  // its default scroll so each screen handles its own scrolling.
  function Phone({ children }) {
    return (
      <div className="kahwa-phone-inner" style={{ width: 402, height: 874, position:'relative' }}>
        <window.IOSDevice width={402} height={874}>
          <div style={{ width: '100%', height: '100%', position:'relative' }}>
            {children}
          </div>
        </window.IOSDevice>
      </div>
    );
  }

  function App() {
    return (
      <window.DesignCanvas initialZoom={0.55}>
        <window.DCSection id="mobile-screens"
          title="KahwaTech · شاشات الموبايل (طولي)"
          subtitle="iPhone 16 Pro · 402×874 · iOS frame + Tajawal · نفس النظام البصري لشاشة التابلت">
          <window.DCArtboard id="waiter" label="A · الموظف (المنيو + السلة + الأوردرات السابقة)" width={420} height={894}>
            <div data-screen-label="A · Waiter Mobile" style={{ padding: 9 }}>
              <Phone><window.KahwaWaiterMobile /></Phone>
            </div>
          </window.DCArtboard>
          <window.DCArtboard id="boufiya" label="B · البوفية (الأوردرات)" width={420} height={894}>
            <div data-screen-label="B · Boufiya Mobile" style={{ padding: 9 }}>
              <Phone><window.KahwaBoufiyaMobile /></Phone>
            </div>
          </window.DCArtboard>
        </window.DCSection>
      </window.DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
