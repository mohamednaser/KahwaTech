<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>KahwaTech · لوحة صاحب القهوة</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#3a6a48">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%233a6a48'/%3E%3Ctext x='50' y='72' font-family='system-ui,sans-serif' font-size='64' font-weight='900' fill='%23fff' text-anchor='middle'%3EK%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<script src="theme-control.js"></script>
<script>
  // The dashboard palette is resolved once at load, so re-theme via a reload.
  window.addEventListener('kahwa:theme', function () { location.reload(); });
</script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%;
    font-family: "Tajawal", system-ui, sans-serif; background: #ecebe6;
    color: #1a1410; overscroll-behavior: none; }
  #root { width: 100%; height: 100%; }
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="menu-data.js"></script>
<script src="owner-data.js"></script>
<script type="text/babel" src="item-photo.jsx"></script>
<!-- Loaded so the dashboard palette (OWNER_T) can read FAST_THEMES. -->
<script type="text/babel" src="variation-fast-clean.jsx"></script>
<script type="text/babel" src="owner-components.jsx"></script>
<script type="text/babel" src="owner-dashboard.jsx"></script>
<script type="text/babel" src="responsive-stage.jsx"></script>

<script type="text/babel" data-presets="react">
  function App() {
    const portrait = window.useIsPortrait();
    const bg = window.themeBg();
    if (portrait) {
      // Phone → the owner's quick mobile dashboard.
      return (
        <window.FitStage dw={402} dh={874} bg={bg}>
          <window.OwnerDashboardPortrait />
        </window.FitStage>
      );
    }
    // Desktop / laptop → the full analytics dashboard, filling the screen.
    return (
      <window.FitStage dw={1180} dh={820} bg={bg} maxScale={1.5}>
        <window.OwnerDashboardLandscape W={1180} H={820} />
      </window.FitStage>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
