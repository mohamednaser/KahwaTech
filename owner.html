<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>KahwaTech · لوحة صاحب القهوة</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: "Tajawal", system-ui, sans-serif;
    background: #ecebe6; color: #1a1410;
    overscroll-behavior: none;
  }
  #root { width: 100%; height: 100%; }
  .kahwa-phone-inner ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="menu-data.js"></script>
<script src="owner-data.js"></script>
<script type="text/babel" src="item-photo.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="owner-components.jsx"></script>
<script type="text/babel" src="owner-dashboard.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel" data-presets="react">
  function Phone({ children }) {
    return (
      <div className="kahwa-phone-inner" style={{ width: 402, height: 874, position:'relative' }}>
        <window.IOSDevice width={402} height={874}>
          <div style={{ width: '100%', height: '100%', position:'relative' }}>{children}</div>
        </window.IOSDevice>
      </div>
    );
  }

  // Macbook-style frame for the landscape dashboard so it doesn't sit on a
  // raw white rectangle. Just a thin chrome bar with traffic lights.
  function LaptopFrame({ children, width, height }) {
    return (
      <div style={{
        width: width + 16, height: height + 30,
        borderRadius: 16, overflow:'hidden',
        background:'#1f1d1a', padding: '6px 8px',
        boxShadow: '0 30px 80px -20px rgba(20,12,5,0.4)',
      }}>
        <div style={{
          height: 22, display:'flex', alignItems:'center', gap: 6,
          paddingInline: 4,
        }}>
          {['#ff5f57','#febc2e','#28c840'].map(c => (
            <div key={c} style={{ width: 11, height: 11, borderRadius: 999, background: c }} />
          ))}
          <div style={{
            flex: 1, height: 18, background:'#2a2724', borderRadius: 6,
            marginInline: 8, color:'#7a7570', fontFamily:'system-ui',
            fontSize: 11, display:'flex', alignItems:'center', justifyContent:'center',
            letterSpacing:'0.04em',
          }}>kahwa.tech / dashboard</div>
        </div>
        <div style={{ width, height, borderRadius: 10, overflow:'hidden', background:'#fff' }}>
          {children}
        </div>
      </div>
    );
  }

  function App() {
    const W = 1180, H = 820;
    return (
      <window.DesignCanvas initialZoom={0.5}>
        <window.DCSection id="owner-dashboard"
          title="KahwaTech · لوحة صاحب القهوة"
          subtitle="نسختين بنفس البيانات: لاب توب أفقي (1180×820) للإدارة، وموبايل طولي (402×874) للجولة السريعة">
          <window.DCArtboard id="landscape" label="A · أفقي (لابتوب / تابلت)" width={W + 24} height={H + 38}>
            <div data-screen-label="A · Owner Landscape" style={{ padding: 4 }}>
              <LaptopFrame width={W} height={H}>
                <window.OwnerDashboardLandscape W={W} H={H} />
              </LaptopFrame>
            </div>
          </window.DCArtboard>
          <window.DCArtboard id="portrait" label="B · طولي (موبايل)" width={420} height={894}>
            <div data-screen-label="B · Owner Portrait" style={{ padding: 9 }}>
              <Phone><window.OwnerDashboardPortrait /></Phone>
            </div>
          </window.DCArtboard>
        </window.DCSection>
      </window.DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
